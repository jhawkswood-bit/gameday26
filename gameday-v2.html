<script>
/* Shared vote storage on jsonblob.com — one store for the whole group,
   so every visitor sees the same live leaderboard. The store was
   created and round-trip tested before this page was deployed. */
const VOTE_STORE_URL = "https://jsonblob.com/api/jsonBlob/019ebd2a-568a-7b09-8975-521620a5e817";
window.storage = {
  async get(key) {
    const r = await fetch(VOTE_STORE_URL, { headers: { Accept: "application/json" }, cache: "no-store" });
    if (!r.ok) throw new Error("vote store unreachable");
    const data = await r.json();
    return data[key] == null ? null : { value: data[key] };
  },
  async set(key, value) {
    const r = await fetch(VOTE_STORE_URL, { headers: { Accept: "application/json" }, cache: "no-store" });
    const data = r.ok ? await r.json() : {};
    data[key] = value;
    const put = await fetch(VOTE_STORE_URL, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    });
    if (!put.ok) throw new Error("vote save failed");
    return true;
  },
};
</script>

function dayAfter(satDate, sunDate) {
  return new Date(sunDate) - new Date(satDate) === 86400000;
}
function fmtDrive(h) {
  if (h === 0) return "same city";
  const hh = Math.floor(h), mm = Math.round((h - hh) * 60);
  return hh + "h" + (mm ? " " + mm + "m" : "");
}

/* Compliance verdict for any Saturday + Sunday combination */
function pairVerdict(sat, sun) {
  if (sat === null) {
    const opt = PAIR_TO_OPTION["none|" + sun.nid];
    if (opt) return { state: "exception", reason: "Single-game trip — approved exception", optionId: opt };
    return { state: "locked", reason: "No single-game package on the board" };
  }
  if (!dayAfter(sat.date, sun.date)) {
    return { state: "locked", reason: "Different weekend (" + sun.label + ")" };
  }
  const h = DRIVES[sat.town + "|" + sun.town];
  if (h === undefined) return { state: "locked", reason: "Too far — no drivable route inside the rules" };
  const opt = PAIR_TO_OPTION[sat.sid + "|" + sun.nid];
  if (h <= DRIVE_CEILING && opt) return { state: "ok", reason: fmtDrive(h) + " drive — compliant", optionId: opt, h };
  if (h <= EXCEPTION_CEILING && opt) return { state: "exception", reason: fmtDrive(h) + " — over 3h, approved with road-trip / overnight stop", optionId: opt, h };
  if (h <= DRIVE_CEILING) return { state: "locked", reason: fmtDrive(h) + " — within range but not a priced package" };
  return { state: "locked", reason: fmtDrive(h) + " — exceeds the 3-hour rule" };
}

/* ---------- shared vote storage ---------- */
const VOTE_KEY = "gameday26-votes-v1";
async function loadVotes() {
  try {
    const r = await window.storage.get(VOTE_KEY, true);
    return r ? JSON.parse(r.value) : {};
  } catch { return {}; }
}
async function saveVotes(v) {
  try { await window.storage.set(VOTE_KEY, JSON.stringify(v), true); return true; }
  catch { return false; }
}

function BuildView({ top3, setTop3, goVote }) {
  const [sat, setSat] = useState(undefined);   // undefined = not chosen; null = NFL-only
  const [sun, setSun] = useState(null);

  const verdicts = useMemo(() => {
    if (sat === undefined) return {};
    const m = {};
    SUN_GAMES.forEach((g) => { m[g.nid] = pairVerdict(sat, g); });
    return m;
  }, [sat]);

  const built = sun ? verdicts[sun.nid] : null;
  const builtOption = built && built.optionId ? OPTIONS.find((o) => o.id === built.optionId) : null;
  const alreadyIn = builtOption ? top3.includes(builtOption.id) : false;

  const addToTop3 = () => {
    if (!builtOption || alreadyIn || top3.length >= 3) return;
    setTop3([...top3, builtOption.id]);
    setSat(undefined); setSun(null);
  };

  const satsByDate = useMemo(() => {
    const m = {};
    SAT_GAMES.forEach((g) => { (m[g.label] = m[g.label] || []).push(g); });
    return Object.entries(m);
  }, []);

  return (
    <div>
      <div style={{ marginBottom: 14, padding: "11px 13px", background: C.panel, border: "1px solid " + C.line, borderRadius: 6 }}>
        <Mono style={{ color: C.red, fontWeight: 700 }}>THE RULES — ENFORCED</Mono>
        <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 12, color: C.dim, margin: "6px 0 0", lineHeight: 1.55 }}>
          Pick a Saturday, and only Sundays that work unlock: same weekend, max 3-hour drive between venues (gold ⚠ pairings are the two approved road-trip exceptions). Everything else stays locked, with the reason shown. Build up to three trips, then send them to the vote.
        </p>
      </div>

      {/* STEP 1 */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
        <Mono style={{ color: C.gold, fontWeight: 700 }}>STEP 1 · PICK YOUR SATURDAY</Mono>
        {sat !== undefined && (
          <button onClick={() => { setSat(undefined); setSun(null); }} style={{ ...togStyle(false), padding: "4px 10px" }}>Change</button>
        )}
      </div>

      {sat === undefined ? (
        <>
          <button onClick={() => { setSat(null); setSun(null); }} style={{
            ...togStyle(false), width: "100%", textAlign: "left", padding: "10px 12px",
            borderStyle: "dashed", marginBottom: 10, borderRadius: 5,
          }}>
            Skip the college game — NFL-only trip
          </button>
          {satsByDate.map(([d, games]) => (
            <div key={d} style={{ marginBottom: 10 }}>
              <Mono style={{ color: C.dim }}>{d.toUpperCase()}</Mono>
              <div style={{ height: 6 }} />
              {games.map((g) => (
                <GameRow key={g.sid} g={g} picked={false} verdict={null} onPick={() => { setSat(g); setSun(null); }} />
              ))}
            </div>
          ))}
        </>
      ) : sat === null ? (
        <div style={{ padding: "10px 12px", border: "1px solid " + C.red + "66", background: C.red + "14", borderRadius: 5, marginBottom: 16 }}>
          <span style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 600, fontSize: 14, color: C.chalk, textTransform: "uppercase" }}>NFL-only trip</span>
          <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 11, color: C.dim, marginTop: 2 }}>One-game weekends — only the approved single-game package unlocks.</div>
        </div>
      ) : (
        <div style={{ marginBottom: 16 }}>
          <GameRow g={sat} picked verdict={null} onPick={() => {}} />
        </div>
      )}

      {/* STEP 2 */}
      {sat !== undefined && (
        <>
          <Mono style={{ color: C.red, fontWeight: 700 }}>STEP 2 · PICK YOUR SUNDAY</Mono>
          <div style={{ height: 8 }} />
          {SUN_GAMES.map((g) => (
            <GameRow
              key={g.nid} g={g}
              picked={sun && sun.nid === g.nid}
              verdict={verdicts[g.nid]}
              onPick={() => setSun(g)}
            />
          ))}
        </>
      )}

      {/* RESULT */}
      {builtOption && (
        <div style={{
          marginTop: 16, padding: 14, borderRadius: 8,
          border: "1px solid " + (built.state === "ok" ? C.green : C.gold) + "77",
          background: C.panelUp,
        }}>
          <Mono style={{ color: built.state === "ok" ? C.green : C.gold, fontWeight: 700 }}>
            {built.state === "ok" ? "✓ COMPLIANT BUILD" : "⚠ APPROVED EXCEPTION"}
          </Mono>
          <h3 style={{ margin: "6px 0 4px", fontFamily: "'Oswald', sans-serif", fontWeight: 700, fontSize: 19, color: C.chalk, textTransform: "uppercase" }}>
            {builtOption.title}
          </h3>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
            <Chip color={C.dim}>{builtOption.window}</Chip>
            {builtOption.fare ? <Chip color={C.gold} filled>{fmtGBP(builtOption.fare)} return</Chip> : <Chip color={C.dim}>Fare TBC</Chip>}
            {builtOption.avios && <Chip color={C.gold}>{builtOption.avios.pts} Avios + {fmtGBP(builtOption.avios.fees)}</Chip>}
            <Chip color={C.dim}>{builtOption.drive}</Chip>
          </div>
          {builtOption.caveats.map((c, i) => (
            <div key={i} style={{ fontFamily: "'Inter', sans-serif", fontSize: 11.5, color: C.amber, lineHeight: 1.45, display: "flex", gap: 6 }}>
              <span>⚠</span><span>{c}</span>
            </div>
          ))}
          <button
            onClick={addToTop3}
            disabled={alreadyIn || top3.length >= 3}
            style={{ ...btnStyle(true, alreadyIn || top3.length >= 3), width: "100%", marginTop: 11 }}
          >
            {alreadyIn ? "Already in your three" : top3.length >= 3 ? "Your three are full" : "Add as choice #" + (top3.length + 1)}
          </button>
        </div>
      )}

      {/* MY TOP 3 */}
      <div style={{ marginTop: 20 }}>
        <Mono style={{ color: C.dim }}>MY TOP THREE · {top3.length}/3 BUILT</Mono>
        <div style={{ height: 8 }} />
        {top3.length === 0 && (
          <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 12.5, color: C.dim, lineHeight: 1.5 }}>
            Nothing built yet. First choice scores 3 points in the group vote, second 2, third 1.
          </p>
        )}
        {top3.map((id, i) => {
          const o = OPTIONS.find((x) => x.id === id);
          return (
            <div key={id} style={{
              display: "flex", alignItems: "center", gap: 10, padding: "9px 12px",
              border: "1px solid " + C.gold + "55", background: C.gold + "0E",
              borderRadius: 5, marginBottom: 6,
            }}>
              <span style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 700, fontSize: 17, color: C.gold, width: 20 }}>{i + 1}</span>
              <span style={{ flex: 1, fontFamily: "'Oswald', sans-serif", fontWeight: 600, fontSize: 13.5, color: C.chalk, textTransform: "uppercase" }}>{o.title}</span>
              <button onClick={() => setTop3(top3.filter((x) => x !== id))} style={{ ...togStyle(false), padding: "3px 9px" }}>✕</button>
            </div>
          );
        })}
        {top3.length > 0 && (
          <button onClick={goVote} style={{ ...btnStyle(true), width: "100%", marginTop: 6 }}>
            Take these to the vote →
          </button>
        )}
      </div>
    </div>
  );
}

/* ---------- comparison ---------- */
const thStyle = { textAlign: "left", padding: "8px 10px", borderBottom: "2px solid " + C.red, verticalAlign: "bottom" };
const tdStyle = { padding: "9px 10px", borderBottom: "1px solid " + L.line, fontFamily: "'Inter', sans-serif", fontSize: 12, color: L.ink, lineHeight: 1.4, verticalAlign: "top" };

function CompareView({ ids, clear }) {
  const picks = OPTIONS.filter((o) => ids.includes(o.id));
  if (picks.length === 0) return (
    <Empty title="Nothing to compare yet" body="Tap Compare on up to three trip cards in the Slate, then come back here for the head-to-head." />
  );
  const rows = [
    ["Weekend", (o) => o.window],
    ["Saturday", (o) => o.college ? o.college.away + " at " + o.college.home : "—"],
    ["Kickoff", (o) => o.college ? o.college.kick : "—"],
    ["Sunday", (o) => o.nfl.away + " at " + o.nfl.home],
    ["Kickoff", (o) => o.nfl.kick],
    ["Fare", (o) => (o.fare ? fmtGBP(o.fare) : "TBC")],
    ["Avios", (o) => (o.avios ? o.avios.pts + " + " + fmtGBP(o.avios.fees) : "—")],
    ["Driving", (o) => o.drive],
    ["Weather", (o) => WEATHER[o.weather].label],
    ["Tickets", (o) => o.tickets ? "Secured" : "To buy"],
    ["Flags", (o) => (o.caveats.length ? o.caveats.length + " caveat" + (o.caveats.length > 1 ? "s" : "") : "None")],
  ];
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <Mono style={{ color: C.dim }}>HEAD-TO-HEAD · {picks.length} SELECTED</Mono>
        <button onClick={clear} style={{ ...btnStyle(false), flex: "none", padding: "6px 12px" }}>Clear</button>
      </div>
      <div style={{ overflowX: "auto", WebkitOverflowScrolling: "touch", background: L.panel, border: "1px solid " + L.line, borderRadius: 10, padding: "4px 12px 10px", boxShadow: "0 3px 14px rgba(0,0,0,0.45)" }}>
        <table style={{ borderCollapse: "collapse", minWidth: picks.length * 165 + 90 }}>
          <thead>
            <tr>
              <th style={thStyle}></th>
              {picks.map((o) => (
                <th key={o.id} style={{ ...thStyle, color: L.ink }}>
                  <div style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 700, fontSize: 14, textTransform: "uppercase", lineHeight: 1.25 }}>{o.title}</div>
                  <Mono style={{ color: C.red }}>{o.week}</Mono>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map(([label, fn], i) => (
              <tr key={i} style={{ background: i % 2 ? "transparent" : "#F1ECDC" }}>
                <td style={{ ...tdStyle, color: L.sub, fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", whiteSpace: "nowrap" }}>{label}</td>
                {picks.map((o) => (
                  <td key={o.id} style={tdStyle}>{fn(o)}</td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Cover({ onEnter }) {
  return (
    <div onClick={onEnter} style={{
      position: "fixed", inset: 0, zIndex: 300, background: "#060B16",
      display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer",
    }}>
      <img src={COVER_IMG} alt="Lads NFL Trip 2026 — tap to enter"
        style={{ width: "100%", height: "100%", objectFit: "contain" }} />
      <div style={{
        position: "absolute", bottom: 14, left: 0, right: 0, textAlign: "center",
        fontFamily: "'JetBrains Mono', monospace", fontSize: 11, letterSpacing: "0.25em",
        color: "#F2F0E9", textTransform: "uppercase",
        textShadow: "0 0 14px rgba(213,10,10,0.9)",
        animation: "tapPulse 1.6s ease-in-out infinite",
      }}>
        ▸ Tap to enter ◂
      </div>
    </div>
  );
}

/* ---------- entry splash: spinning shield ---------- */
const NFL_SHIELD = "https://a.espncdn.com/i/teamlogos/leagues/500/nfl.png";

function Splash({ done }) {
  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 200, background: "#060B16",
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
      animation: "splashOut 0.6s ease 2.3s forwards", pointerEvents: done ? "none" : "auto",
    }}>
      <div aria-hidden style={{
        position: "absolute", inset: 0, opacity: 0.06,
        backgroundImage: "repeating-linear-gradient(90deg, #F2F0E9 0 1px, transparent 1px 56px)",
      }} />
      <div style={{ perspective: 700 }}>
        <div style={{ width: 120, height: 120, display: "flex", alignItems: "center", justifyContent: "center", animation: "coinSpin 1.9s cubic-bezier(0.2, 0.7, 0.3, 1) both", filter: "drop-shadow(0 0 26px rgba(213,10,10,0.55))" }}>
          <img src={NFL_SHIELD} alt="" width="110" height="110" style={{ objectFit: "contain" }}
            onError={(e) => { e.target.replaceWith("🏈"); }} />
        </div>
      </div>
      <div style={{ marginTop: 26, fontFamily: "'Oswald', sans-serif", fontWeight: 700, fontSize: 34, color: "#F2F0E9", textTransform: "uppercase", letterSpacing: "0.04em", animation: "popIn 0.5s ease-out 0.9s both" }}>
        Gameday<span style={{ color: "#D50A0A" }}> '26</span>
      </div>
      <div style={{ marginTop: 10, fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.22em", color: "#8B97AC", textTransform: "uppercase", animation: "popIn 0.5s ease-out 1.3s both" }}>
        Loading the slate…
      </div>
    </div>
  );

/* ---------- celebrations ---------- */
function Fireworks() {
  const sparks = useMemo(() => {
    const arr = [];
    const colors = ["#FFD966", "#FF5A5A", "#7EC8FF", "#7CE3A1", "#F2F0E9", "#E08A2E"];
    [[24, 32, 1.15], [72, 24, 1.5], [50, 42, 1.85]].forEach(([x, y, delay], b) => {
      for (let i = 0; i < 26; i++) {
        const ang = (Math.PI * 2 * i) / 26 + Math.random() * 0.25;
        const dist = 70 + Math.random() * 95;
        arr.push({
          x, y,
          delay: delay + Math.random() * 0.15,
          dx: Math.cos(ang) * dist,
          dy: Math.sin(ang) * dist,
          c: colors[(i + b) % colors.length],
        });
      }
    });
    return arr;
  }, []);
  return (
    <>
      {sparks.map((p, i) => (
        <span key={i} style={{
          position: "absolute", left: p.x + "%", top: p.y + "%",
          width: 6, height: 6, borderRadius: 3, background: p.c, opacity: 0,
          "--dx": p.dx + "px", "--dy": p.dy + "px",
          animation: "fwSpark 1.15s ease-out " + p.delay + "s forwards",
        }} />
      ))}
    </>
  );
}

function Celebration({ name, onDone }) {
  useEffect(() => {
    const t = setTimeout(onDone, 4400);
    return () => clearTimeout(t);
  }, []);
  const postBar = { position: "absolute", background: "#FFC72C", borderRadius: 3, boxShadow: "0 0 10px rgba(255,199,44,0.5)" };
  return (
    <div onClick={onDone} style={{ position: "fixed", inset: 0, zIndex: 100, background: "rgba(4,8,16,0.9)", overflow: "hidden", cursor: "pointer" }}>
      <div style={{ position: "absolute", left: "50%", top: "10%", transform: "translateX(-50%)", width: 170, height: 230 }}>
        <div style={{ ...postBar, left: 0, top: 0, width: 6, height: 150 }} />
        <div style={{ ...postBar, right: 0, top: 0, width: 6, height: 150 }} />
        <div style={{ ...postBar, left: 0, top: 150, width: "100%", height: 6 }} />
        <div style={{ ...postBar, left: "50%", top: 156, marginLeft: -3, width: 6, height: 74 }} />
      </div>
      <div style={{ position: "absolute", left: "50%", top: "34%", marginLeft: -22, fontSize: 44, animation: "kickArc 1.35s ease-in-out 0.15s both" }}>🏈</div>
      <Fireworks />
      <div style={{ position: "absolute", left: 0, right: 0, top: "56%", textAlign: "center", animation: "popIn 0.5s ease-out 1.4s both", padding: "0 20px" }}>
        <div style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 700, fontSize: "clamp(38px, 12vw, 54px)", color: "#FFD966", textTransform: "uppercase", textShadow: "0 2px 22px rgba(255,217,102,0.55)" }}>
          It's good!

    </div>
  );
}

function BeerToast({ onDone }) {

    return () => clearTimeout(t);

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>

        background: "rgba(4,8,16,0.94)", border: "1px solid " + C.gold, borderRadius: 14,

          <span style={{ fontSize: 46, display: "inline-block", animation: "clinkL 0.8s ease-in-out 0.25s 2" }}>🍺</span>

/* ---------- voting ---------- */
function VoteView({ top3, setTop3 }) {
  const [votes, setVotes] = useState(null);
  const [name, setName] = useState(() => {
    try { return localStorage.getItem(WHO_KEY) || ""; } catch { return ""; }
  });
  const [busy, setBusy] = useState(false);
  const [party, setParty] = useState(false);
  const [msg, setMsg] = useState("");

  useEffect(() => { loadVotes().then(setVotes); }, []);

  const togglePick = (id) => {
    setTop3(top3.includes(id) ? top3.filter((x) => x !== id) : top3.length < 3 ? [...top3, id] : top3);
  };

  const submit = async () => {
    const n = name.trim();
    if (!n || top3.length === 0) { setMsg("Tap your face above and pick at least one trip."); return; }
    setBusy(true);
    const fresh = await loadVotes();
    fresh[n] = { picks: top3, ts: Date.now() };
    const ok = await saveVotes(fresh);
    setVotes(fresh);
    setMsg(ok ? "Vote in. The board updates for everyone." : "Couldn't save — try again.");
    setBusy(false);
    if (ok) setParty(true);
  };

  const removeMine = async () => {
    const n = name.trim();
    if (!n || !votes || !votes[n]) return;
    setBusy(true);
    const fresh = await loadVotes();
    delete fresh[n];
    await saveVotes(fresh);
    setVotes(fresh);
    setTop3([]);
    setMsg("Your vote's been pulled.");
    setBusy(false);
  };

  const board = useMemo(() => {
    if (!votes) return [];
    const pts = {};
    Object.values(votes).forEach((v) => {
      (v.picks || []).forEach((id, i) => {
        pts[id] = (pts[id] || 0) + (3 - i);
      });
    });
    return Object.entries(pts)
      .map(([id, p]) => ({ o: OPTIONS.find((x) => x.id === Number(id)), p }))
      .filter((x) => x.o)
      .sort((a, b) => b.p - a.p);
  }, [votes]);

  const voterCount = votes ? Object.keys(votes).length : 0;

  return (
    <div>
      <div style={{ background: C.panel, border: "1px solid " + C.line, borderRadius: 8, padding: 14, marginBottom: 18 }}>
        <Mono style={{ color: C.red, fontWeight: 700 }}>CAST YOUR BALLOT</Mono>
        <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 12.5, color: C.dim, margin: "8px 0 12px", lineHeight: 1.5 }}>
          Your built trips carry through from the Build tab, or tap below to adjust the order — first choice scores 3, second 2, third 1. Votes are shared with everyone using this app.
        </p>
        <Mono style={{ color: C.gold, fontWeight: 700 }}>WHO ARE YOU?</Mono>
        <div style={{ display: "flex", gap: 8, margin: "10px 0 14px" }}>
          {VOTERS.map((v) => {
            const sel = name === v.name;
            return (
              <button key={v.id} onClick={() => { setName(v.name); try { localStorage.setItem(WHO_KEY, v.name); } catch {} }} style={{
                flex: 1, padding: "10px 4px 9px", borderRadius: 10, cursor: "pointer",
                border: "2px solid " + (sel ? C.red : C.line),
                background: sel ? C.red + "1E" : "transparent",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 7,
                boxShadow: sel ? "0 0 18px " + C.red + "66" : "none",
              }}>
                <span style={{ width: 54, height: 54, borderRadius: 27, overflow: "hidden", border: "2px solid " + (sel ? C.red : C.line), display: "block", flexShrink: 0 }}>
                  <img src={v.img} alt={v.name} width="54" height="54" loading="lazy" style={{ objectFit: "cover", display: "block" }} />
                </span>
                <span style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 600, fontSize: 12, color: sel ? C.chalk : C.dim, textTransform: "uppercase", letterSpacing: "0.04em" }}>
                  {v.name}
                </span>
              </button>
            );
          })}
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 320, overflowY: "auto", paddingRight: 2 }}>
          {OPTIONS.map((o) => {
            const idx = top3.indexOf(o.id);
            const sel = idx >= 0;
            return (
              <button key={o.id} onClick={() => togglePick(o.id)} style={{
                display: "flex", alignItems: "center", gap: 10, textAlign: "left",
                padding: "9px 11px", borderRadius: 4, cursor: "pointer",
                border: "1px solid " + (sel ? C.gold : C.line),
                background: sel ? C.gold + "18" : "transparent",
              }}>
                <span style={{
                  width: 22, height: 22, borderRadius: 11, flexShrink: 0,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  background: sel ? C.gold : C.panelUp, color: sel ? C.bg : C.dim,
                  fontFamily: "'JetBrains Mono', monospace", fontSize: 11, fontWeight: 700,
                }}>{sel ? idx + 1 : "·"}</span>
                <span style={{ fontFamily: "'Oswald', sans-serif", fontSize: 13.5, fontWeight: 600, color: C.chalk, textTransform: "uppercase", letterSpacing: "0.02em", flex: 1 }}>
                  {o.title}
                </span>
                <Mono style={{ color: C.dim }}>{o.week}</Mono>
              </button>
            );
          })}
        </div>
        <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
          <button onClick={submit} disabled={busy} style={{ ...btnStyle(true), opacity: busy ? 0.6 : 1 }}>
            {busy ? "Saving…" : "Submit vote"}
          </button>
          <button onClick={removeMine} disabled={busy} style={{ ...btnStyle(false), flex: "0 0 auto", padding: "9px 14px" }}>
            Withdraw
          </button>
        </div>
        {msg && <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 12, color: C.gold, marginTop: 10, marginBottom: 0 }}>{msg}</p>}
      </div>

      <div style={{ background: L.panel, border: "1px solid " + L.line, borderRadius: 10, padding: "14px 14px 8px", boxShadow: "0 3px 14px rgba(0,0,0,0.45)" }}>
        <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", borderBottom: "3px solid " + C.red, paddingBottom: 8 }}>
          <span style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 700, fontSize: 18, color: L.ink, textTransform: "uppercase", letterSpacing: "0.02em" }}>The Board</span>
          <Mono style={{ color: L.sub }}>{voterCount} VOTE{voterCount === 1 ? "" : "S"} IN</Mono>
        </div>
        {votes === null && <p style={{ color: L.sub, fontFamily: "'Inter', sans-serif", fontSize: 13, padding: "12px 0" }}>Loading the board…</p>}
        {votes !== null && board.length === 0 && (
          <p style={{ color: L.sub, fontFamily: "'Inter', sans-serif", fontSize: 13, padding: "12px 0" }}>No votes yet. History awaits.</p>
        )}
        <div style={{ paddingTop: 10 }}>
          {board.map(({ o, p }, i) => (
            <div key={o.id} style={{
              display: "flex", alignItems: "center", gap: 12, padding: "11px 13px",
              background: i === 0 ? "#F5E9C4" : "#FFFFFF",
              border: "1px solid " + (i === 0 ? C.gold : L.line),
              borderRadius: 6, marginBottom: 7,
            }}>
              <span style={{
                fontFamily: "'Oswald', sans-serif", fontWeight: 700, fontSize: 22,
                color: i === 0 ? "#A77B00" : L.sub, width: 28, textAlign: "center",
              }}>{i + 1}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 600, fontSize: 15, color: L.ink, textTransform: "uppercase" }}>{o.title}</div>
                <Mono style={{ color: L.sub }}>{o.week} · {o.window}</Mono>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 700, fontSize: 19, color: i === 0 ? "#A77B00" : L.ink }}>{p}</div>
                <Mono style={{ color: L.sub }}>PTS</Mono>
              </div>
            </div>
          ))}
        </div>
      </div>
      {party && <Celebration name={name} onDone={() => setParty(false)} />}
    </div>
  );
}

function Empty({ title, body }) {
  return (
    <div style={{ textAlign: "center", padding: "48px 24px", border: "1px dashed " + C.line, borderRadius: 8 }}>
      <div style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 600, fontSize: 17, color: C.chalk, textTransform: "uppercase" }}>{title}</div>
      <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 13, color: C.dim, lineHeight: 1.55, maxWidth: 340, margin: "10px auto 0" }}>{body}</p>
    </div>
  );
}

/* ---------- main app (simplified flow) ---------- */
function WhoScreen({ onPick }) {
  return (
    <div style={{ minHeight: "100vh", background: C.bg, padding: "64px 18px 40px", boxSizing: "border-box" }}>
      <div style={{ textAlign: "center", marginBottom: 30 }}>
        <Mono style={{ color: C.red, fontWeight: 700 }}>GAMEDAY '26 · THE VOTE</Mono>
        <h1 style={{ margin: "10px 0 0", fontFamily: "'Oswald', sans-serif", fontWeight: 700, fontSize: 40, color: C.chalk, textTransform: "uppercase", letterSpacing: "0.02em" }}>
          Who are you?
        </h1>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, maxWidth: 420, margin: "0 auto" }}>
        {VOTERS.map((v, i) => (
          <button key={v.id} onClick={() => onPick(v.name)} style={{
            background: C.panel, border: "2px solid " + C.line, borderRadius: 14, padding: "18px 10px 14px",
            display: "flex", flexDirection: "column", alignItems: "center", gap: 10, cursor: "pointer",
            animation: "popIn 0.45s ease-out " + (0.15 + i * 0.12) + "s both",
          }}>
            <img src={v.img} alt={v.name} width="104" height="104"
              style={{ borderRadius: 52, objectFit: "cover", border: "3px solid " + C.red, boxShadow: "0 0 22px rgba(213,10,10,0.35)" }} />
            <span style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 700, fontSize: 18, color: C.chalk, textTransform: "uppercase" }}>{v.name}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function BoardPanel({ votes, who, onClose, onWithdraw, busy }) {
  const board = useMemo(() => {
    if (!votes) return [];
    const pts = {};
    Object.values(votes).forEach((v) => {
      (v.picks || []).forEach((id, i) => { pts[id] = (pts[id] || 0) + (3 - i); });
    });
    return Object.entries(pts)
      .map(([id, p]) => ({ o: OPTIONS.find((x) => x.id === Number(id)), p }))
      .filter((x) => x.o)
      .sort((a, b) => b.p - a.p);
  }, [votes]);
  const voterCount = votes ? Object.keys(votes).length : 0;
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 90, background: "rgba(4,8,16,0.95)", overflowY: "auto", WebkitOverflowScrolling: "touch", padding: "26px 14px 44px" }}>
      <div style={{ maxWidth: 560, margin: "0 auto" }}>
        <div style={{ background: L.panel, border: "1px solid " + L.line, borderRadius: 10, padding: "14px 14px 10px", boxShadow: "0 6px 30px rgba(0,0,0,0.6)", animation: "popIn 0.35s ease-out both" }}>
          <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", borderBottom: "3px solid " + C.red, paddingBottom: 8 }}>
            <span style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 700, fontSize: 18, color: L.ink, textTransform: "uppercase", letterSpacing: "0.02em" }}>The Board</span>
            <Mono style={{ color: L.sub }}>{voterCount} OF 4 VOTED</Mono>
          </div>
          <div style={{ display: "flex", gap: 10, padding: "12px 2px 4px", alignItems: "center" }}>
            {VOTERS.map((v) => {
              const has = votes && votes[v.name];
              return (
                <img key={v.id} src={v.img} alt={v.name} width="36" height="36"
                  style={{ borderRadius: 18, objectFit: "cover", border: "2px solid " + (has ? "#3FB46A" : L.line), opacity: has ? 1 : 0.35 }} />
              );
            })}
            <Mono style={{ color: L.sub }}>IN SO FAR</Mono>
          </div>
          {voterCount === 0 && (
            <p style={{ color: L.sub, fontFamily: "'Inter', sans-serif", fontSize: 13, padding: "10px 0" }}>No votes yet. History awaits.</p>
          )}
          <div style={{ paddingTop: 8 }}>
            {board.map(({ o, p }, i) => (
              <div key={o.id} style={{
                display: "flex", alignItems: "center", gap: 12, padding: "11px 13px",
                background: i === 0 ? "#F5E9C4" : "#FFFFFF",
                border: "1px solid " + (i === 0 ? C.gold : L.line),
                borderRadius: 6, marginBottom: 7,
              }}>
                <span style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 700, fontSize: 22, color: i === 0 ? "#A77B00" : L.sub, width: 28, textAlign: "center" }}>{i + 1}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 600, fontSize: 15, color: L.ink, textTransform: "uppercase" }}>{o.title}</div>
                  <Mono style={{ color: L.sub }}>{o.week} · {o.window}</Mono>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 700, fontSize: 19, color: i === 0 ? "#A77B00" : L.ink }}>{p}</div>
                  <Mono style={{ color: L.sub }}>PTS</Mono>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          <button onClick={onClose} style={{ ...btnStyle(true), padding: "12px 0" }}>Back to the trips</button>
          {votes && votes[who] && (
            <button onClick={onWithdraw} disabled={busy} style={{ ...btnStyle(false), flex: "0 0 auto", padding: "12px 16px" }}>
              Pull my vote
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [stage, setStage] = useState("cover");
  const [who, setWho] = useState(() => {
    try { return localStorage.getItem(WHO_KEY) || ""; } catch { return ""; }
  });
  const [expanded, setExpanded] = useState(null);
  const [top3, setTop3] = useState([]);
  const [votes, setVotes] = useState(null);
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");
  const [party, setParty] = useState(false);
  const [cheers, setCheers] = useState(false);
  const [showBoard, setShowBoard] = useState(false);
  const prev3 = useRef(0);
  const prefilled = useRef(false);

  useEffect(() => {
    if (stage !== "splash") return;
    const t = setTimeout(() => setStage(who ? "in" : "who"), 3000);
    return () => clearTimeout(t);
  }, [stage]);

  useEffect(() => { loadVotes().then(setVotes); }, []);

  useEffect(() => {
    if (votes && who && votes[who] && !prefilled.current) {
      prefilled.current = true;
      setTop3(votes[who].picks || []);
    }
  }, [votes, who]);

  useEffect(() => {
    if (top3.length === 3 && prev3.current < 3) setCheers(true);
    prev3.current = top3.length;
  }, [top3]);

  const togglePick = (id) =>
    setTop3(top3.includes(id) ? top3.filter((x) => x !== id) : top3.length < 3 ? [...top3, id] : top3);

  const submit = async () => {
    if (!who || top3.length === 0) return;
    setBusy(true); setMsg("");
    const fresh = await loadVotes();
    fresh[who] = { picks: top3, ts: Date.now() };
    const ok = await saveVotes(fresh);
    setVotes(fresh);
    setBusy(false);
    if (ok) setParty(true);
    else setMsg("Couldn't save — check your signal and try again.");
  };

  const withdraw = async () => {
    if (!who) return;
    setBusy(true);
    const fresh = await loadVotes();
    delete fresh[who];
    await saveVotes(fresh);
    setVotes(fresh); setTop3([]); setBusy(false); setShowBoard(false);
  };

  const me = VOTERS.find((v) => v.name === who);

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.chalk }}>
      <style>{[
        "@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap');",
        "* { -webkit-tap-highlight-color: transparent; }",
        "button { font: inherit; }",
        "::-webkit-scrollbar { height: 6px; width: 6px; }",
        "::-webkit-scrollbar-thumb { background: " + C.line + "; border-radius: 3px; }",
        "@media (prefers-reduced-motion: reduce) { * { transition: none !important; } }",
        "@keyframes fwSpark { 0% { opacity: 1; transform: translate(0,0) scale(1); } 100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.35); } }",
        "@keyframes kickArc { 0% { transform: translate(-42vw, 30vh) rotate(0deg); opacity: 1; } 60% { transform: translate(0vw, -16vh) rotate(420deg); } 100% { transform: translate(32vw, -4vh) rotate(760deg); opacity: 1; } }",
        "@keyframes popIn { 0% { opacity: 0; transform: scale(0.55); } 100% { opacity: 1; transform: scale(1); } }",
        "@keyframes clinkL { 0%, 100% { transform: rotate(0deg) translateX(0); } 50% { transform: rotate(-16deg) translateX(-8px); } }",
        "@keyframes clinkR { 0%, 100% { transform: rotate(0deg) translateX(0) scaleX(-1); } 50% { transform: rotate(16deg) translateX(8px) scaleX(-1); } }",
        "@keyframes coinSpin { 0% { transform: rotateY(0deg) scale(0.55); opacity: 0; } 18% { opacity: 1; } 100% { transform: rotateY(1080deg) scale(1); opacity: 1; } }",
        "@keyframes splashOut { 0% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }",
        "@keyframes tapPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }",
      ].join("\n")}</style>

      {stage === "who" ? (
        <WhoScreen onPick={(n) => {
          setWho(n);
          try { localStorage.setItem(WHO_KEY, n); } catch {}
          setStage("in");
        }} />
      ) : (
        <>
          {/* ===== hero ===== */}
          <header style={{
            position: "relative", overflow: "hidden",
            background: "linear-gradient(180deg, #0A1226 0%, " + C.bg + " 100%)",
            borderBottom: "3px solid " + C.red,
            padding: "26px 18px 20px",
          }}>
            <div aria-hidden style={{
              position: "absolute", inset: 0, opacity: 0.07,
              backgroundImage: "repeating-linear-gradient(90deg, " + C.chalk + " 0 1px, transparent 1px 56px)",
            }} />
            <div style={{ position: "relative", maxWidth: 680, margin: "0 auto" }}>
              <Mono style={{ color: C.red, fontWeight: 700 }}>THE ANNUAL US TRIP · VOL. IV · FALL 2026</Mono>
              <h1 style={{
                margin: "8px 0 0", fontFamily: "'Oswald', sans-serif", fontWeight: 700,
                fontSize: "clamp(36px, 10vw, 54px)", lineHeight: 0.98,
                textTransform: "uppercase", letterSpacing: "0.01em",
              }}>
                Gameday<span style={{ color: C.red }}> '26</span>
              </h1>
              <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 13.5, color: C.dim, margin: "10px 0 0", maxWidth: 440, lineHeight: 1.55 }}>
                Fifteen doubleheader weekends. Tap <b style={{ color: C.chalk }}>PICK THIS TRIP</b> on your three favourites — your first pick scores 3 points, second 2, third 1. That's it.
              </p>
            </div>
          </header>

          {/* ===== sticky who-bar ===== */}
          <nav style={{
            position: "sticky", top: 0, zIndex: 20, background: C.bg + "F2",
            backdropFilter: "blur(8px)", borderBottom: "1px solid " + C.line,
          }}>
            <div style={{ maxWidth: 680, margin: "0 auto", display: "flex", alignItems: "center", gap: 10, padding: "8px 14px" }}>
              {me && <img src={me.img} alt={who} width="36" height="36" style={{ borderRadius: 18, objectFit: "cover", border: "2px solid " + C.red, flexShrink: 0 }} />}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 600, fontSize: 14, textTransform: "uppercase", color: C.chalk }}>{who || "—"}</div>
                <button onClick={() => setStage("who")} style={{
                  background: "none", border: "none", padding: 0, cursor: "pointer",
                  fontFamily: "'JetBrains Mono', monospace", fontSize: 9, letterSpacing: "0.1em",
                  color: C.dim, textTransform: "uppercase",
                }}>Not you? Switch</button>
              </div>
              <button onClick={() => setShowBoard(true)} style={{ ...togStyle(true), padding: "9px 14px", flexShrink: 0 }}>
                🏆 The Board{votes && Object.keys(votes).length ? " · " + Object.keys(votes).length : ""}
              </button>
            </div>
          </nav>

          {/* ===== the slate ===== */}
          <main style={{ maxWidth: 680, margin: "0 auto", padding: "16px 14px 190px" }}>
            <Mono style={{ color: C.dim }}>THE 15 OPTIONS · PICK YOUR THREE</Mono>
            <div style={{ height: 10 }} />
            {OPTIONS.map((o) => (
              <OptionCard
                key={o.id} o={o}
                expanded={expanded === o.id}
                onToggle={() => setExpanded(expanded === o.id ? null : o.id)}
                pickIdx={top3.indexOf(o.id)}
                onPick={() => togglePick(o.id)}
                pickFull={top3.length >= 3}
              />
            ))}
          </main>

          {/* ===== submit bar ===== */}
          {top3.length > 0 && (
            <div style={{
              position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 40,
              background: "#0A1226F5", borderTop: "2px solid " + C.red, backdropFilter: "blur(8px)",
            }}>
              <div style={{ maxWidth: 680, margin: "0 auto", display: "flex", alignItems: "center", gap: 12, padding: "10px 14px" }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  {top3.map((id, i) => {
                    const o = OPTIONS.find((x) => x.id === id);
                    return (
                      <div key={id} style={{
                        fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.04em",
                        color: i === 0 ? C.gold : C.dim, textTransform: "uppercase", lineHeight: 1.7,
                        whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
                      }}>
                        {i + 1}. {o.title}
                      </div>
                    );
                  })}
                </div>
                <button onClick={submit} disabled={busy} style={{
                  ...btnStyle(true), flex: "0 0 auto", padding: "14px 20px", fontSize: 12, opacity: busy ? 0.6 : 1,
                }}>
                  {busy ? "Saving…" : "Submit vote 🏈"}
                </button>
              </div>
              {msg && <div style={{ textAlign: "center", fontFamily: "'Inter', sans-serif", fontSize: 11.5, color: C.amber, padding: "0 14px 9px" }}>{msg}</div>}
            </div>
          )}

          <footer style={{ textAlign: "center", padding: "0 18px 28px" }}>
            <Mono style={{ color: C.line }}>FARES VIA GOOGLE FLIGHTS · AVIOS VIA BA.COM · FLEX KICKOFFS SET 6–12 DAYS OUT</Mono>
          </footer>
        </>
      )}

      {cheers && <BeerToast onDone={() => setCheers(false)} />}
      {party && <Celebration name={who} onDone={() => { setParty(false); setShowBoard(true); }} />}
      {showBoard && <BoardPanel votes={votes} who={who} onClose={() => setShowBoard(false)} onWithdraw={withdraw} busy={busy} />}
      {stage === "cover" && <Cover onEnter={() => setStage("splash")} />}
      {stage === "splash" && <Splash done={false} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
{% endraw %}
