<script>
/* Shared vote storage backed by jsonblob.com — every visitor reads and
   writes the same blob, so the leaderboard is live for the whole group.
   The blob URL is created once by the deploy workflow and committed
   to blob.json alongside this page. */
let __blobUrl = null;
async function voteStoreUrl() {
  if (!__blobUrl) {
    const r = await fetch("./blob.json", { cache: "no-store" });
    if (!r.ok) throw new Error("vote store not configured");
    __blobUrl = (await r.json()).url;
  }
  return __blobUrl;
}
window.storage = {
  async get(key) {
    const url = await voteStoreUrl();
    const r = await fetch(url, { headers: { Accept: "application/json" }, cache: "no-store" });
    if (!r.ok) throw new Error("vote store unreachable");
    const data = await r.json();
    return data[key] == null ? null : { value: data[key] };
  },
  async set(key, value) {
    const url = await voteStoreUrl();
    const r = await fetch(url, { headers: { Accept: "application/json" }, cache: "no-store" });
    const data = r.ok ? await r.json() : {};
    data[key] = value;
    const put = await fetch(url, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    });
    if (!put.ok) throw new Error("vote save failed");
    return true;
  },
};
</script>

const DRIVE_CEILING = 3;
const EXCEPTION_CEILING = 4.5;

function dayAfter(satDate, sunDate) {
  return new Date(sunDate) - new Date(satDate) === 86400000;
}
function fmtDrive(h) {
  if (h === 0) return "same city";
  const hh = Math.floor(h), mm = Math.round((h - hh) * 60);
  return hh + "h" + (mm ? " " + mm + "m" : "");
}

/* Compliance verdict for any Saturday + Sunday combination */
function pairVerdict(sat, sun) {
  if (sat === null) {
    const opt = PAIR_TO_OPTION["none|" + sun.nid];
    if (opt) return { state: "exception", reason: "Single-game trip — approved exception", optionId: opt };
    return { state: "locked", reason: "No single-game package on the board" };
  }
  if (!dayAfter(sat.date, sun.date)) {
    return { state: "locked", reason: "Different weekend (" + sun.label + ")" };
  }
  const h = DRIVES[sat.town + "|" + sun.town];
  if (h === undefined) return { state: "locked", reason: "Too far — no drivable route inside the rules" };
  const opt = PAIR_TO_OPTION[sat.sid + "|" + sun.nid];
  if (h <= DRIVE_CEILING && opt) return { state: "ok", reason: fmtDrive(h) + " drive — compliant", optionId: opt, h };
  if (h <= EXCEPTION_CEILING && opt) return { state: "exception", reason: fmtDrive(h) + " — over 3h, approved with road-trip / overnight stop", optionId: opt, h };
  if (h <= DRIVE_CEILING) return { state: "locked", reason: fmtDrive(h) + " — within range but not a priced package" };
  return { state: "locked", reason: fmtDrive(h) + " — exceeds the 3-hour rule" };
}

/* ---------- shared vote storage ---------- */
const VOTE_KEY = "gameday26-votes-v1";
async function loadVotes() {
  try {
    const r = await window.storage.get(VOTE_KEY, true);
    return r ? JSON.parse(r.value) : {};
  } catch { return {}; }
}
async function saveVotes(v) {
  try { await window.storage.set(VOTE_KEY, JSON.stringify(v), true); return true; }
  catch { return false; }
}

/* ---------- voting ---------- */
function VoteView({ top3, setTop3 }) {
  const [votes, setVotes] = useState(null);
  const [name, setName] = useState("");
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");

  useEffect(() => { loadVotes().then(setVotes); }, []);

  const togglePick = (id) => {
    setTop3(top3.includes(id) ? top3.filter((x) => x !== id) : top3.length < 3 ? [...top3, id] : top3);
  };

  const submit = async () => {
    const n = name.trim();
    if (!n || top3.length === 0) { setMsg("Add your name and build or pick at least one trip."); return; }
    setBusy(true);
    const fresh = await loadVotes();
    fresh[n] = { picks: top3, ts: Date.now() };
    const ok = await saveVotes(fresh);
    setVotes(fresh);
    setMsg(ok ? "Vote in. The board updates for everyone." : "Couldn't save — try again.");
    setBusy(false);
  };

  const removeMine = async () => {
    const n = name.trim();
    if (!n || !votes || !votes[n]) return;
    setBusy(true);
    const fresh = await loadVotes();
    delete fresh[n];
    await saveVotes(fresh);
    setVotes(fresh);
    setTop3([]);
    setMsg("Your vote's been pulled.");
    setBusy(false);
  };

  const board = useMemo(() => {
    if (!votes) return [];
    const pts = {};
    Object.values(votes).forEach((v) => {
      (v.picks || []).forEach((id, i) => {
        pts[id] = (pts[id] || 0) + (3 - i);
      });
    });
    return Object.entries(pts)
      .map(([id, p]) => ({ o: OPTIONS.find((x) => x.id === Number(id)), p }))
      .filter((x) => x.o)
      .sort((a, b) => b.p - a.p);
  }, [votes]);

  const voterCount = votes ? Object.keys(votes).length : 0;

  return (
    <div>
      <div style={{ background: C.panel, border: "1px solid " + C.line, borderRadius: 8, padding: 14, marginBottom: 18 }}>
        <Mono style={{ color: C.red, fontWeight: 700 }}>CAST YOUR BALLOT</Mono>
        <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 12.5, color: C.dim, margin: "8px 0 12px", lineHeight: 1.5 }}>
          Your built trips carry through from the Build tab, or tap below to adjust the order — first choice scores 3, second 2, third 1. Votes are shared with everyone using this app.
        </p>
        <input
          value={name}
          onChange={(e) => setName(e.target.value)}
          placeholder="Your name"
          style={{
            width: "100%", boxSizing: "border-box", padding: "10px 12px", borderRadius: 4,
            border: "1px solid " + C.line, background: C.bg, color: C.chalk,
            fontFamily: "'Inter', sans-serif", fontSize: 14, marginBottom: 12, outline: "none",
          }}
        />
        <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 320, overflowY: "auto", paddingRight: 2 }}>
          {OPTIONS.map((o) => {
            const idx = top3.indexOf(o.id);
            const sel = idx >= 0;
            return (
              <button key={o.id} onClick={() => togglePick(o.id)} style={{
                display: "flex", alignItems: "center", gap: 10, textAlign: "left",
                padding: "9px 11px", borderRadius: 4, cursor: "pointer",
                border: "1px solid " + (sel ? C.gold : C.line),
                background: sel ? C.gold + "18" : "transparent",
              }}>
                <span style={{
                  width: 22, height: 22, borderRadius: 11, flexShrink: 0,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  background: sel ? C.gold : C.panelUp, color: sel ? C.bg : C.dim,
                  fontFamily: "'JetBrains Mono', monospace", fontSize: 11, fontWeight: 700,
                }}>{sel ? idx + 1 : "·"}</span>
                <span style={{ fontFamily: "'Oswald', sans-serif", fontSize: 13.5, fontWeight: 600, color: C.chalk, textTransform: "uppercase", letterSpacing: "0.02em", flex: 1 }}>
                  {o.title}
                </span>
                <Mono style={{ color: C.dim }}>{o.week}</Mono>
              </button>
            );
          })}
        </div>
        <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
          <button onClick={submit} disabled={busy} style={{ ...btnStyle(true), opacity: busy ? 0.6 : 1 }}>
            {busy ? "Saving…" : "Submit vote"}
          </button>
          <button onClick={removeMine} disabled={busy} style={{ ...btnStyle(false), flex: "0 0 auto", padding: "9px 14px" }}>
            Withdraw
          </button>
        </div>
        {msg && <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 12, color: C.gold, marginTop: 10, marginBottom: 0 }}>{msg}</p>}
      </div>

      <Mono style={{ color: C.dim }}>THE BOARD · {voterCount} VOTE{voterCount === 1 ? "" : "S"} IN</Mono>
      {votes === null && <p style={{ color: C.dim, fontFamily: "'Inter', sans-serif", fontSize: 13, marginTop: 10 }}>Loading the board…</p>}
      {votes !== null && board.length === 0 && (
        <p style={{ color: C.dim, fontFamily: "'Inter', sans-serif", fontSize: 13, marginTop: 10 }}>No votes yet. History awaits.</p>
      )}
      <div style={{ marginTop: 10 }}>
        {board.map(({ o, p }, i) => (
          <div key={o.id} style={{
            display: "flex", alignItems: "center", gap: 12, padding: "11px 13px",
            background: i === 0 ? C.gold + "12" : C.panel,
            border: "1px solid " + (i === 0 ? C.gold + "55" : C.line),
            borderRadius: 6, marginBottom: 7,
          }}>
            <span style={{
              fontFamily: "'Oswald', sans-serif", fontWeight: 700, fontSize: 22,
              color: i === 0 ? C.gold : C.dim, width: 28, textAlign: "center",
            }}>{i + 1}</span>
            <div style={{ flex: 1 }}>
              <div style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 600, fontSize: 15, color: C.chalk, textTransform: "uppercase" }}>{o.title}</div>
              <Mono style={{ color: C.dim }}>{o.week} · {o.window}</Mono>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 700, fontSize: 19, color: i === 0 ? C.gold : C.chalk }}>{p}</div>
              <Mono style={{ color: C.dim }}>PTS</Mono>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Empty({ title, body }) {
  return (
    <div style={{ textAlign: "center", padding: "48px 24px", border: "1px dashed " + C.line, borderRadius: 8 }}>
      <div style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 600, fontSize: 17, color: C.chalk, textTransform: "uppercase" }}>{title}</div>
      <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 13, color: C.dim, lineHeight: 1.55, maxWidth: 340, margin: "10px auto 0" }}>{body}</p>
    </div>
  );
}

/* ---------- main app ---------- */
function App() {
  const [tab, setTab] = useState("slate");
  const [month, setMonth] = useState("All");
  const [pricedOnly, setPricedOnly] = useState(false);
  const [twoGames, setTwoGames] = useState(false);
  const [sort, setSort] = useState("date");
  const [expanded, setExpanded] = useState(null);
  const [compareIds, setCompareIds] = useState([]);
  const [top3, setTop3] = useState([]);

  const filtered = useMemo(() => {
    let list = OPTIONS.filter((o) =>
      (month === "All" || o.month === month) &&
      (!pricedOnly || o.fare !== null) &&
      (!twoGames || o.college !== null)
    );
    if (sort === "fare") list = [...list].sort((a, b) => (a.fare ?? 99999) - (b.fare ?? 99999));
    else list = [...list].sort((a, b) => a.id - b.id);
    return list;
  }, [month, pricedOnly, twoGames, sort]);

  const toggleCompare = (id) =>
    setCompareIds((c) => c.includes(id) ? c.filter((x) => x !== id) : c.length < 3 ? [...c, id] : c);

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.chalk }}>
      <style>{[
        "@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap');",
        "* { -webkit-tap-highlight-color: transparent; }",
        "button { font: inherit; }",
        "::-webkit-scrollbar { height: 6px; width: 6px; }",
        "::-webkit-scrollbar-thumb { background: " + C.line + "; border-radius: 3px; }",
        "input::placeholder { color: " + C.dim + "; }",
        "@media (prefers-reduced-motion: reduce) { * { transition: none !important; } }",
      ].join("\n")}</style>

      {/* ===== hero ===== */}
      <header style={{
        position: "relative", overflow: "hidden",
        background: "linear-gradient(180deg, #0A1226 0%, " + C.bg + " 100%)",
        borderBottom: "3px solid " + C.red,
        padding: "30px 18px 22px",
      }}>
        <div aria-hidden style={{
          position: "absolute", inset: 0, opacity: 0.07,
          backgroundImage: "repeating-linear-gradient(90deg, " + C.chalk + " 0 1px, transparent 1px 56px)",
        }} />
        <div style={{ position: "relative", maxWidth: 680, margin: "0 auto" }}>
          <Mono style={{ color: C.red, fontWeight: 700 }}>THE ANNUAL US TRIP · VOL. IV · FALL 2026</Mono>
          <h1 style={{
            margin: "8px 0 0", fontFamily: "'Oswald', sans-serif", fontWeight: 700,
            fontSize: "clamp(38px, 11vw, 58px)", lineHeight: 0.98,
            textTransform: "uppercase", letterSpacing: "0.01em",
          }}>
            Gameday<span style={{ color: C.red }}> '26</span>
          </h1>
          <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 13, color: C.dim, margin: "10px 0 0", maxWidth: 420, lineHeight: 1.55 }}>
            Fifteen doubleheader weekends. One Saturday in college football's cathedrals, one Sunday in the NFL. Build your three, compare them, vote them in.
          </p>
          <div style={{ display: "flex", gap: 6, marginTop: 14, flexWrap: "wrap" }}>
            <Chip color={C.gold} filled>NYC '23</Chip>
            <Chip color={C.gold} filled>HOUSTON '24</Chip>
            <Chip color={C.gold} filled>DENVER '25</Chip>
            <Chip color={C.red} filled><b>2026 — TO BE DECIDED</b></Chip>
          </div>
        </div>
      </header>

      {/* ===== tabs ===== */}
      <nav style={{
        position: "sticky", top: 0, zIndex: 20, background: C.bg + "F2",
        backdropFilter: "blur(8px)", borderBottom: "1px solid " + C.line,
        display: "flex", justifyContent: "center",
      }}>
        <div style={{ display: "flex", width: "100%", maxWidth: 680 }}>
          {[
            ["slate", "Slate"],
            ["build", "Build" + (top3.length ? " · " + top3.length : "")],
            ["compare", "Compare" + (compareIds.length ? " · " + compareIds.length : "")],
            ["vote", "Vote"],
          ].map(([k, lbl]) => (
            <button key={k} onClick={() => setTab(k)} style={{
              flex: 1, padding: "13px 0", background: "transparent", border: "none", cursor: "pointer",
              borderBottom: "3px solid " + (tab === k ? C.red : "transparent"),
              color: tab === k ? C.chalk : C.dim,
              fontFamily: "'Oswald', sans-serif", fontWeight: 600, fontSize: 13,
              textTransform: "uppercase", letterSpacing: "0.06em",
            }}>{lbl}</button>
          ))}
        </div>
      </nav>

      <main style={{ maxWidth: 680, margin: "0 auto", padding: "16px 14px 80px" }}>
        {tab === "slate" && (
          <>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
              {["All", "Sep", "Oct", "Nov"].map((m) => (
                <button key={m} onClick={() => setMonth(m)} style={{
                  padding: "6px 13px", borderRadius: 16, cursor: "pointer",
                  border: "1px solid " + (month === m ? C.red : C.line),
                  background: month === m ? C.red : "transparent",
                  color: month === m ? C.chalk : C.dim,
                  fontFamily: "'JetBrains Mono', monospace", fontSize: 11, letterSpacing: "0.08em",
                }}>{m.toUpperCase()}</button>
              ))}
            </div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
              <button onClick={() => setPricedOnly(!pricedOnly)} style={togStyle(pricedOnly)}>✈ Priced flights</button>
              <button onClick={() => setTwoGames(!twoGames)} style={togStyle(twoGames)}>2-game weekends</button>
              <button onClick={() => setSort(sort === "date" ? "fare" : "date")} style={togStyle(false)}>
                Sort: {sort === "date" ? "Calendar" : "Cheapest fare"}
              </button>
            </div>

            <Mono style={{ color: C.dim }}>{filtered.length} OF 15 OPTIONS SHOWING</Mono>
            <div style={{ height: 10 }} />

            {filtered.map((o) => (
              <OptionCard
                key={o.id} o={o}
                expanded={expanded === o.id}
                onToggle={() => setExpanded(expanded === o.id ? null : o.id)}
                compared={compareIds.includes(o.id)}
                onCompare={() => toggleCompare(o.id)}
                compareFull={compareIds.length >= 3}
              />
            ))}
            {filtered.length === 0 && (
              <Empty title="Nothing matches" body="Loosen a filter — every option is hiding behind one of those toggles." />
            )}
          </>
        )}

        {tab === "build" && <BuildView top3={top3} setTop3={setTop3} goVote={() => setTab("vote")} />}
        {tab === "compare" && <CompareView ids={compareIds} clear={() => setCompareIds([])} />}
        {tab === "vote" && <VoteView top3={top3} setTop3={setTop3} />}
      </main>

      {/* compare tray */}
      {tab === "slate" && compareIds.length > 0 && (
        <div style={{
          position: "fixed", bottom: 14, left: 0, right: 0, display: "flex", justifyContent: "center",
          pointerEvents: "none", zIndex: 30,
        }}>
          <button onClick={() => setTab("compare")} style={{
            pointerEvents: "auto", display: "flex", alignItems: "center", gap: 10,
            padding: "12px 22px", borderRadius: 30, border: "1px solid " + C.red,
            background: C.red, color: C.chalk, cursor: "pointer",
            fontFamily: "'Oswald', sans-serif", fontWeight: 600, fontSize: 14,
            textTransform: "uppercase", letterSpacing: "0.06em",
            boxShadow: "0 6px 24px rgba(213,10,10,0.45)",
          }}>
            Compare {compareIds.length} trip{compareIds.length > 1 ? "s" : ""} →
          </button>
        </div>
      )}

      <footer style={{ textAlign: "center", padding: "0 18px 28px" }}>
        <Mono style={{ color: C.line }}>FARES VIA GOOGLE FLIGHTS · AVIOS VIA BA.COM · FLEX KICKOFFS SET 6–12 DAYS OUT</Mono>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
